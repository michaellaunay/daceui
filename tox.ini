[tox]
envlist = py312

[testenv]
constrain_package_deps = true
deps =
    -c constraints-modern.txt
    ecreall_dace @ git+https://github.com/michaellaunay/dace.git
    ecreall_pontus @ git+https://github.com/michaellaunay/pontus.git
    zope.testrunner
extras = test
commands =
    python -m zope.testrunner --test-path=. -s daceui {posargs}
