name: tests-legacy

# Best-effort CI for the legacy code base (Python 3.6 era).
# DaceUI currently has no test suite of its own: this job performs an
# import smoke check plus the (empty) historical suite, with the
# known-good dependency pins from constraints-legacy.txt and
# ecreall_dace / ecreall_pontus installed from their maintained forks.
# To be stabilised during Phase 1 of the modernisation roadmap
# (reproducible legacy build / "golden master") — see README.md.
#
# Era-compatibility notes (inherited from dace's and pontus' first CI
# runs, 2026-07-13):
# - setuptools < 46: the 2016/2017 sdists (zope.interface 4.3.3, ...)
#   still import the `Feature` API, removed in setuptools 46 (2020).
# - Debian buster was archived in 2024: apt sources are repointed to
#   archive.debian.org (Release files are frozen, hence
#   Check-Valid-Until=false).
# - libzmq3-dev: pyzmq 14.4.1 (via ecreall_dace) predates Python 3.6
#   wheels and must be compiled against the system libzmq.
# - libjpeg-dev, zlib1g-dev: Pillow 3.4.2 (via ecreall_pontus)
#   predates Python 3.6 wheels and requires both to build from source.
# - unlike dace and pontus, `mock` is not needed here: the empty suite
#   never creates a Pyramid Configurator, so substanced's venusian
#   scan (which imports its own mock-using test modules) never runs.

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  legacy-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Import smoke check and test suite in a Python 3.6 container
        run: |
          docker run --rm -v "$PWD":/src -w /src python:3.6-buster bash -ec "
            sed -i 's|deb.debian.org|archive.debian.org|g; s|security.debian.org|archive.debian.org|g' /etc/apt/sources.list &&
            sed -i '/buster-updates/d' /etc/apt/sources.list &&
            apt-get update -o Acquire::Check-Valid-Until=false &&
            apt-get install -y --no-install-recommends libzmq3-dev libjpeg-dev zlib1g-dev &&
            pip install --no-cache-dir --upgrade 'pip<22' &&
            pip install --no-cache-dir 'setuptools<46' wheel &&
            pip install --no-cache-dir -c constraints-legacy.txt \
              'git+https://github.com/michaellaunay/dace.git#egg=ecreall_dace' \
              'git+https://github.com/michaellaunay/pontus.git#egg=ecreall_pontus' &&
            pip install --no-cache-dir -c constraints-legacy.txt -e . &&
            python -c 'import daceui' &&
            python setup.py test
          "
